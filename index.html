<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dawnly — The World, Gathered Daily</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 110 90' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='55' y1='2' x2='55' y2='14' stroke='%23c8820a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='80' y1='7' x2='74' y2='17' stroke='%23c8820a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='98' y1='22' x2='89' y2='27' stroke='%23c8820a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='30' y1='7' x2='36' y2='17' stroke='%23c8820a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='12' y1='22' x2='21' y2='27' stroke='%23c8820a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='104' y1='44' x2='93' y2='44' stroke='%23c8820a' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='6' y1='44' x2='17' y2='44' stroke='%23c8820a' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M30 52 Q30 28 55 28 Q80 28 80 52' fill='%23e8a020' opacity='0.9'/%3E%3Cpath d='M30 52 Q30 28 55 28 Q80 28 80 52' fill='none' stroke='%23c8820a' stroke-width='1.5'/%3E%3Crect x='8' y='50' width='42' height='30' rx='1' fill='%23f0ead8' stroke='%232a2410' stroke-width='1.5'/%3E%3Crect x='60' y='50' width='42' height='30' rx='1' fill='%23f0ead8' stroke='%232a2410' stroke-width='1.5'/%3E%3Cline x1='55' y1='50' x2='55' y2='80' stroke='%232a2410' stroke-width='1.5'/%3E%3Cpath d='M8 80 Q55 88 102 80' stroke='%232a2410' stroke-width='1.5' fill='none'/%3E%3Cpath d='M8 50 Q55 44 102 50' stroke='%232a2410' stroke-width='1.5' fill='none'/%3E%3C/svg%3E"/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-1:  #1a1408;
      --ink-2:  #5a5040;
      --ink-3:  #9a8a70;
      --amber:  #c8820a;
      --paper:  #f5f0e4;
      --paper-2:#ede6d4;
      --border: rgba(42,36,16,0.15);

      /* Big story treatment — warm terracotta */
      --big-paper:   #f5e8d4;
      --big-paper-2: #eeddc4;
      --big-accent:  #b85c1a;
      --big-border:  rgba(184,92,26,0.35);
    }

    html, body { height: 100%; overflow: hidden; background: #e8e0cc; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--ink-1); }

    .np {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      overflow: hidden;
    }

    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      flex-shrink: 0;
    }

    .hero.light { background: linear-gradient(180deg,rgba(255,210,120,0.18) 0%,rgba(252,240,215,0.08) 65%,var(--paper) 100%); }
    .hero.dark  { background: linear-gradient(180deg,rgba(10,15,35,0.95) 0%,rgba(18,28,58,0.65) 58%,var(--paper) 100%); }

    .sky { position: absolute; inset: 0; pointer-events: none; opacity: 0.5; }

    .meta-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px 8px;
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 2;
    }

    .meta-label,
    .meta-domain {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .meta-domain {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero.dark .meta-label,
    .hero.dark .meta-domain {
      color: rgba(245, 238, 220, 0.82);
    }

    .logo-block {
      position: relative;
      z-index: 2;
      padding: 10px 24px 0;
      border-bottom: 3px double rgba(42,36,16,0.4);
    }

    .hero.dark .logo-block {
      border-bottom-color: rgba(245, 238, 220, 0.22);
    }

    .logo-icon { width: 80px; height: 66px; margin: 0 auto 4px; display: block; }

    .ray { animation: ray-pulse 3s ease-in-out infinite; }
    .ray:nth-child(1) { animation-delay: 0.0s; }
    .ray:nth-child(2) { animation-delay: 0.3s; }
    .ray:nth-child(3) { animation-delay: 0.6s; }
    .ray:nth-child(4) { animation-delay: 0.9s; }
    .ray:nth-child(5) { animation-delay: 1.2s; }
    .ray:nth-child(6) { animation-delay: 1.5s; }
    .ray:nth-child(7) { animation-delay: 1.8s; }
    .ray:nth-child(8) { animation-delay: 0.15s; }

    @keyframes ray-pulse {
      0%,100% { opacity: 0.35; }
      50% { opacity: 1.0; }
    }

    #sun-body { animation: sun-glow 3s ease-in-out infinite; }

    @keyframes sun-glow {
      0%,100% { opacity: 0.55; }
      50% { opacity: 1.0; }
    }

    .logo-wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--ink-1);
      letter-spacing: 2px;
      line-height: 1;
      display: block;
    }

    .hero.dark .logo-wordmark {
      color: rgba(26, 20, 8, 0.9);
    }

    .logo-tagline {
      font-family: 'Jost', sans-serif;
      font-size: 8.5px;
      font-weight: 400;
      color: var(--ink-2);
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
      padding: 7px 0 10px;
      min-height: 28px;
    }

    .hero.dark .logo-tagline {
      color: rgba(26, 20, 8, 0.72);
    }

    .ticker-wrap {
      overflow: hidden;
      padding: 4px 0;
      min-height: 22px;
      border-bottom: 2px solid var(--border);
      position: relative;
      z-index: 2;
      background: rgba(42,36,16,0.05);
      flex-shrink: 0;
    }

    .hero.dark .ticker-wrap {
      background: rgba(255,255,255,0.03);
      border-bottom-color: rgba(245, 238, 220, 0.16);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker 40s linear infinite;
      will-change: transform;
    }

    .ticker-item {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(42,36,16,0.78);
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
    }

    .ticker-item::after {
      content: "·";
      margin-left: 20px;
      color: rgba(42,36,16,0.35);
    }

    .hero.dark .ticker-item {
      color: rgba(26, 20, 8, 0.88);
    }

    .hero.dark .ticker-item::after {
      color: rgba(26, 20, 8, 0.45);
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 10px;
      min-height: 0;
    }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      flex-shrink: 0;
    }

    .sr-line { flex: 1; height: 1px; background: var(--ink-1); }

    .sr-text {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-1);
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      display: grid;
      gap: 1px;
      background: rgba(42,36,16,0.2);
      border: 1px solid rgba(42,36,16,0.2);
      min-height: 0;
    }

    .card {
      background: var(--paper);
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      padding: 12px 11px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--paper);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-back {
      transform: rotateY(180deg);
      background: var(--paper-2);
      justify-content: space-between;
    }

    .card-num {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .card:nth-child(1) .card-num,
    .card:nth-child(2) .card-num { color: var(--ink-1); }

    .card-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.35;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
    }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .card-regions,
    .card-hint,
    .back-hint,
    .back-source,
    .footer-left,
    .reset-front span,
    .reset-back span {
      font-family: 'Jost', sans-serif;
      text-transform: uppercase;
    }

    .card-regions {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-3);
    }

    .card-hint,
    .back-hint {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--ink-3);
    }

    .back-summary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      font-style: normal;
      color: var(--ink-1);
      line-height: 1.4;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      margin-bottom: 8px;
    }

    .back-sources {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .back-source {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-source:hover { color: var(--ink-1); }

    .back-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-3);
      flex-shrink: 0;
    }

    .back-hint {
      text-align: right;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* -----------------------------------------------------------------------
       Big story treatment — terracotta accent for stories dominating the day
    ----------------------------------------------------------------------- */

    .card.big-story .card-front,
    .card.big-story .card-back {
      background: var(--big-paper);
    }

    .card.big-story .card-back {
      background: var(--big-paper-2);
    }

    /* Left accent bar on the front */
    .card.big-story .card-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--big-accent);
      opacity: 0.7;
    }

    /* "Big story" label in card number position */
    .card.big-story .card-num {
      color: var(--big-accent);
    }

    /* Related headlines section on card back */
    .related-block {
      flex-shrink: 0;
      border-top: 1px solid var(--big-border);
      padding-top: 6px;
      margin-top: 6px;
    }

    .related-label {
      font-family: 'Jost', sans-serif;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--big-accent);
      margin-bottom: 5px;
    }

    .related-headline {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 10px;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-2);
      line-height: 1.4;
      margin-bottom: 3px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .related-headline:last-child { margin-bottom: 0; }

    /* -----------------------------------------------------------------------
       Grouped card — one card representing multiple story angles
    ----------------------------------------------------------------------- */

    .card.grouped .card-front,
    .card.grouped .card-back {
      background: var(--big-paper);
    }

    .card.grouped .card-back {
      background: var(--big-paper-2);
    }

    .card.grouped .card-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--big-accent);
    }

    .card.grouped .card-num {
      color: var(--big-accent);
    }

    /* Angle count badge on front */
    .angle-badge {
      font-family: 'Jost', sans-serif;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--big-accent);
      border: 1px solid var(--big-accent);
      padding: 1px 5px;
      display: inline-block;
      margin-bottom: 5px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* Angle list on card back */
    .angle-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .angle-item {
      border-left: 2px solid var(--big-border);
      padding-left: 8px;
      flex-shrink: 0;
    }

    .angle-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .angle-summary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 9px;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-2);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .img-card {
      background: #2a2410;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    /* Flip wrapper — same pattern as .card-inner */
    .img-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
    }

    .img-card.flipped .img-card-inner { transform: rotateY(180deg); }

    .img-front,
    .img-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .img-front {
      background: #2a2410;
    }

    .img-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.78;
    }

    .img-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* Stats back panel */
    .img-back {
      transform: rotateY(180deg);
      background: var(--paper-2);
      padding: 14px 13px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stats-label {
      font-family: 'Jost', sans-serif;
      font-size: 7.5px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .stats-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 9px;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1;
      flex-shrink: 0;
    }

    .stat-desc {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-2);
      line-height: 1.3;
    }

    .stats-regions {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--ink-2);
      line-height: 1.5;
      font-style: italic;
      flex-shrink: 0;
    }

    .img-back-hint {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-3);
      text-align: right;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-3);
      height: 100%;
    }

    .footer {
      border-top: 1px solid rgba(42,36,16,0.25);
      padding: 6px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-2);
    }

    .footer-subscribe {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--amber);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,130,10,0.35);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .footer-subscribe:hover {
      color: var(--ink-1);
      border-bottom-color: var(--ink-1);
    }

    .reset-badge { width: 80px; height: 24px; cursor: default; perspective: 500px; }

    .reset-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .reset-badge:hover .reset-inner { transform: rotateX(180deg); }

    .reset-front, .reset-back {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .reset-back { transform: rotateX(180deg); }

    .reset-front span {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--ink-2);
      border-bottom: 1px solid var(--ink-3);
      padding-bottom: 1px;
    }

    .reset-back span {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--ink-2);
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .meta-bar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 8px 12px 6px;
      }

      .meta-label,
      .meta-domain {
        font-size: 7px;
        letter-spacing: 1px;
      }

      .meta-label:first-child {
        justify-self: start;
      }

      .meta-domain {
        position: static;
        transform: none;
        justify-self: center;
      }

      #date-label {
        justify-self: end;
        text-align: right;
      }
    }

    @media (max-width: 768px) {
      .grid {
        gap: 8px;
        border: none;
        background: transparent;
      }

      .card,
      .img-card {
        border: 1px solid rgba(42,36,16,0.2);
      }

      .content {
        padding: 0 12px 12px;
      }
    }

    @media (max-width: 768px) {
      html, body {
        overflow: auto;
        height: auto;
      }

      .np {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .content {
        min-height: auto;
      }

      .grid {
        flex: unset;
        min-height: auto;
      }
    }
  </style>
</head>
<body>
<div class="np">

  <div class="hero" id="hero">
    <canvas class="sky" id="sky"></canvas>

    <div class="meta-bar">

<script>
const TAGLINES = [
  "The Morning Paper, Rebuilt For Today",
  "Once A Day. Just Like It Used To Be.",
  "Your Daily Paper. Nothing In Between.",
  "The News, The Way It Used To Feel.",
  "One Edition. Every Morning.",
  "Read It. Put It Down. Live Your Day.",
  "The Paper Lands Once."
];

const TICKER_MESSAGES = [
  "Subscribe To The Dawnly Newsletter",
  "Get The Top 10 Stories Every Morning",
  "One Edition A Day. Nothing In Between.",
  "Read Dawnly At Dawnly.News"
];

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function getTorontoNowParts() {
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Toronto',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hourCycle: 'h23'
  }).formatToParts(new Date());

  const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return {
    year: Number(map.year),
    month: Number(map.month),
    day: Number(map.day),
    hour: Number(map.hour),
    minute: Number(map.minute),
    second: Number(map.second)
  };
}

function getDailyTagline() {
  const now = new Date();
  const day = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  return TAGLINES[day % TAGLINES.length];
}

function getCountdown() {
  const p = getTorontoNowParts();
  const nowMinutes = p.hour * 60 + p.minute;
  const resetMinutes = 6 * 60;

  let diffMinutes;
  if (nowMinutes < resetMinutes) {
    diffMinutes = resetMinutes - nowMinutes;
  } else {
    diffMinutes = (24 * 60 - nowMinutes) + resetMinutes;
  }

  const hours = Math.floor(diffMinutes / 60);
  const minutes = diffMinutes % 60;
  return `${hours}h ${minutes}m`;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    timeZone: 'America/Toronto',
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });
}

function formatDisplayDate() {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Toronto',
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric'
  }).format(new Date());
}

function getEditionNumber() {
  const launchDate = new Date('2026-03-12T00:00:00');
  const p = getTorontoNowParts();

  const currentEditionDate = new Date(p.year, p.month - 1, p.day);
  if (p.hour < 6) {
    currentEditionDate.setDate(currentEditionDate.getDate() - 1);
  }

  const diffDays = Math.floor((currentEditionDate - launchDate) / 86400000);
  return Math.max(1, diffDays + 1);
}

function setTimeOfDay() {
  const hero = document.getElementById('hero');
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const rays = document.querySelectorAll('.ray');
  const sunB = document.getElementById('sun-body');

  hero.classList.remove('light', 'dark');

  setTimeout(() => {
    canvas.width = canvas.offsetWidth || 900;
    canvas.height = canvas.offsetHeight || 200;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w = canvas.width, h = canvas.height;
    let rayColor = '#c8820a';
    let sunFill = '#e8a020';

    const torontoHour = getTorontoNowParts().hour;
    const isLight = torontoHour >= 6 && torontoHour < 18;

    if (isLight) {
      hero.classList.add('light');

      const g = ctx.createRadialGradient(w * 0.5, h * 0.3, 5, w * 0.5, h * 0.3, 100);
      g.addColorStop(0, 'rgba(255,195,70,0.14)');
      g.addColorStop(1, 'rgba(255,195,70,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    } else {
      hero.classList.add('dark');
      rayColor = 'rgba(190,210,255,0.5)';
      sunFill = 'rgba(180,200,255,0.25)';

      for (let i = 0; i < 55; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h * 0.8;
        const r = 0.35 + Math.random() * 1.1;
        const a = 0.2 + Math.random() * 0.55;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    rays.forEach(r => r.setAttribute('stroke', rayColor));
    if (sunB) sunB.setAttribute('fill', sunFill);
  }, 80);
}

function buildTicker() {
  const track = document.getElementById('ticker');
  const items = [...TICKER_MESSAGES, ...TICKER_MESSAGES, ...TICKER_MESSAGES];

  track.innerHTML = items.map(message =>
    `<span class="ticker-item">${message}</span>`
  ).join('');
}

/**
 * Seeded pseudo-random number generator (mulberry32).
 * Produces a consistent sequence for a given numeric seed,
 * so image positions stay fixed within a day but change daily.
 */
function seededRandom(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/**
 * Pick 2 random slot indices (0–11) for image cards each day.
 * Uses today's date as seed so placement is stable on refresh
 * but rotates daily.
 */
function getDailyImageSlots() {
  const today = new Date().toISOString().slice(0, 10);
  const seed = today.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
  const rand = seededRandom(seed);

  const slots = [];
  while (slots.length < 2) {
    const candidate = Math.floor(rand() * 12);
    if (!slots.includes(candidate)) slots.push(candidate);
  }
  return slots;
}

function buildEqualGridWithImage(stories) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const TOTAL_SLOTS  = 12;  // 6 columns × 2 rows
  const STORY_SLOTS  = 10;  // max story cards
  const IMAGE_COUNT  = 2;   // always exactly 2 fixed image cards

  // -----------------------------------------------------------------------
  // Compute stats for the two fixed image card backs
  // -----------------------------------------------------------------------
  const totalMentions   = stories.reduce((s, x) => s + (x.mentions || 0), 0);
  const allRegions      = [...new Set(stories.flatMap(x => x.regions || []))];
  const allSourceNames  = [...new Set(stories.flatMap(x => (x.sources || []).map(s => s.name)))];
  const top             = stories[0] || null;

  const statsCard1 = {
    label: "Edition At A Glance",
    rows: [
      { num: totalMentions,        desc: "articles\nprocessed" },
      { num: allRegions.length,    desc: "regions\ncovered" },
      { num: allSourceNames.length,desc: "sources\ncited" },
      { num: stories.length,       desc: "stories\nranked" },
    ],
    footer: null,
  };

  const statsCard2 = top ? {
    label: "Top Story",
    rows: [
      { num: top.mentions,  desc: "sources\ncovered it" },
      { num: top.diversity, desc: "regions\nreached" },
      { num: Math.round(top.score), desc: "relevance\nscore" },
    ],
    footer: top.regions ? top.regions.join(" · ") : null,
  } : null;

  // The 2 permanently-image slots (random daily placement)
  const imageSlots = getDailyImageSlots();

  // Track which of the two fixed image slots we're filling
  // so we assign stats to them in order
  let fixedImagesFilled = 0;
  const fixedStats = [statsCard1, statsCard2];

  // Unique seed counter for all image cards (no repeats)
  let imgSeedBase = 50;
  let storyIndex  = 0;
  const storyItems = stories.slice(0, STORY_SLOTS);

  const isMobile = window.innerWidth <= 768;

  if (isMobile) {
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gridTemplateRows    = 'none';
    grid.style.overflowY           = 'visible';

    for (let slot = 0; slot < TOTAL_SLOTS; slot++) {
      const isImageSlot = imageSlots.includes(slot);

      if (isImageSlot) {
        const stats = fixedStats[fixedImagesFilled++] || null;
        const img = buildImageCard(1, 1, 1, imgSeedBase++, stats);
        img.style.gridColumn = 'auto';
        img.style.gridRow    = 'auto';
        img.style.minHeight  = '180px';
        grid.appendChild(img);
      } else if (storyIndex < storyItems.length) {
        const card = buildCard(storyItems[storyIndex], storyIndex, 1, 1, 1, 1);
        card.style.gridColumn = 'auto';
        card.style.gridRow    = 'auto';
        card.style.minHeight  = '220px';
        grid.appendChild(card);
        storyIndex++;
      } else {
        const img = buildImageCard(1, 1, 1, imgSeedBase++, null);
        img.style.gridColumn = 'auto';
        img.style.gridRow    = 'auto';
        img.style.minHeight  = '180px';
        grid.appendChild(img);
      }
    }
    return;
  }

  // Desktop: 6-column × 2-row grid
  grid.style.overflowY           = 'hidden';
  grid.style.gridTemplateColumns = 'repeat(6, 1fr)';
  grid.style.gridTemplateRows    = 'repeat(2, 1fr)';

  for (let slot = 0; slot < TOTAL_SLOTS; slot++) {
    const col = (slot % 6) + 1;
    const row = slot < 6 ? 1 : 2;
    const isImageSlot = imageSlots.includes(slot);

    if (isImageSlot) {
      const stats = fixedStats[fixedImagesFilled++] || null;
      grid.appendChild(buildImageCard(1, col, row, imgSeedBase++, stats));
    } else if (storyIndex < storyItems.length) {
      grid.appendChild(buildCard(storyItems[storyIndex], storyIndex, 1, col, row, 1));
      storyIndex++;
    } else {
      grid.appendChild(buildImageCard(1, col, row, imgSeedBase++, null));
    }
  }
}

function buildCard(story, index, colSpan, colStart, rowStart, maxMentions) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.gridColumn = `${colStart} / span ${colSpan}`;
  card.style.gridRow = `${rowStart} / span 1`;
  card._maxMentions = maxMentions || 1;

  const rank = ROMAN[index] || String(index + 1);
  const regions = story.regions
    ? (typeof story.regions === 'number' ? `${story.regions} Regions` : story.regions)
    : (story.diversity ? `${story.diversity} Regions` : '');

  const sources = (story.sources || []).slice(0, 3).map(s =>
    `<a class="back-source" href="${s.link}" target="_blank" rel="noopener"><span class="back-dot"></span>${s.name}</a>`
  ).join('');

  const isGrouped = story.is_grouped === true;

  if (isGrouped) {
    // -----------------------------------------------------------------------
    // Grouped card — front shows lead headline + angle badge,
    // back shows all angles with individual headlines and summaries
    // -----------------------------------------------------------------------
    card.classList.add('grouped');

    const angleCount = story.angle_count || (story.angles || []).length || 1;
    const anglesHTML = (story.angles || []).map(a => `
      <div class="angle-item">
        <div class="angle-headline">${a.headline}</div>
        ${a.summary ? `<div class="angle-summary">${a.summary}</div>` : ''}
      </div>`).join('');

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="card-num">${rank}</div>
          <div class="angle-badge">${angleCount} Angles · Tap To Explore</div>
          <div class="card-headline">${story.headline}</div>
          <div class="card-foot">
            <div class="card-regions">${regions}</div>
            <div class="card-hint">Tap ↻</div>
          </div>
        </div>
        <div class="card-back">
          <div class="angle-list">${anglesHTML}</div>
          <div class="back-sources">${sources}</div>
          <div class="back-hint">Tap ↻</div>
        </div>
      </div>`;

  } else {
    // -----------------------------------------------------------------------
    // Regular card — existing behaviour
    // -----------------------------------------------------------------------
    const isBigStory = story.big_story === true;
    if (isBigStory) card.classList.add('big-story');

    const relatedHeadlines = isBigStory && (story.related_headlines || []).length > 0
      ? `<div class="related-block">
          <div class="related-label">Also In This Story</div>
          ${story.related_headlines.map(h =>
            `<div class="related-headline">${h}</div>`
          ).join('')}
         </div>`
      : '';

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="card-num">${rank}</div>
          <div class="card-headline">${story.headline}</div>
          <div class="card-foot">
            <div class="card-regions">${regions}</div>
            <div class="card-hint">Tap ↻</div>
          </div>
        </div>
        <div class="card-back">
          <div class="back-summary">${story.summary || story.headline}</div>
          ${relatedHeadlines}
          <div class="back-sources">${sources}</div>
          <div class="back-hint">Tap ↻</div>
        </div>
      </div>`;
  }

  card.addEventListener('click', () => card.classList.toggle('flipped'));

  requestAnimationFrame(() => {
    const front = card.querySelector('.card-front');
    const headline = card.querySelector('.card-headline');
    const num = card.querySelector('.card-num');
    const foot = card.querySelector('.card-foot');

    if (front && headline) {
      const availH = front.clientHeight
        - (num ? num.offsetHeight + 4 : 0)
        - (foot ? foot.offsetHeight + 5 : 0)
        - 18;

      headline.style.overflow = 'hidden';
      headline.style.display = '-webkit-box';
      headline.style.webkitBoxOrient = 'vertical';

      let minSize = 14;
      let maxSize = 34;
      let bestSize = minSize;
      let bestLines = 2;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.1;
        const lines = Math.max(2, Math.floor(availH / lineH));

        headline.style.fontSize = mid + 'px';
        headline.style.lineHeight = '1.1';
        headline.style.webkitLineClamp = String(lines);

        const fits = headline.scrollHeight <= headline.clientHeight + 2;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      headline.style.fontSize = bestSize + 'px';
      headline.style.lineHeight = '1.1';
      headline.style.webkitLineClamp = String(bestLines);
    }

    const back = card.querySelector('.card-back');
    const summary = card.querySelector('.back-summary');
    const sourcesBlock = card.querySelector('.back-sources');
    const backHint = card.querySelector('.back-hint');
    const relatedBlock = card.querySelector('.related-block');

    // Back text fitting only applies to regular (non-grouped) cards
    if (back && summary && !isGrouped) {
      const availBackH = back.clientHeight
        - (sourcesBlock ? sourcesBlock.offsetHeight + 8 : 0)
        - (backHint ? backHint.offsetHeight + 5 : 0)
        - (relatedBlock ? relatedBlock.offsetHeight + 6 : 0)
        - 18;

      summary.style.overflow = 'hidden';
      summary.style.display = '-webkit-box';
      summary.style.webkitBoxOrient = 'vertical';

      let minSize = 13;
      let maxSize = 24;
      let bestSize = minSize;
      let bestLines = 3;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.35;
        const lines = Math.max(3, Math.floor(availBackH / lineH));

        summary.style.fontSize = mid + 'px';
        summary.style.lineHeight = '1.35';
        summary.style.webkitLineClamp = String(lines);

        const fits = summary.scrollHeight <= summary.clientHeight + 2;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      summary.style.fontSize = bestSize + 'px';
      summary.style.lineHeight = '1.35';
      summary.style.webkitLineClamp = String(bestLines);
    }
  });

  return card;
}

/**
 * Build an image card.
 * @param {number}      colSpan
 * @param {number}      colStart
 * @param {number}      rowStart
 * @param {number}      seedOffset  - unique per card so photos never repeat
 * @param {object|null} statsBack   - if provided, card flips to show stats
 *   statsBack = { label, rows: [{num, desc}], footer }
 */
function buildImageCard(colSpan, colStart, rowStart, seedOffset = 0, statsBack = null) {
  const ic = document.createElement('div');
  ic.className = 'img-card';
  ic.style.gridColumn = `${colStart} / span ${Math.max(1, colSpan)}`;
  ic.style.gridRow    = `${rowStart} / span 1`;

  const daySeed = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const seed    = `dawnly-${daySeed}-${seedOffset}`;

  let backHTML = '';
  if (statsBack) {
    const rowsHTML = statsBack.rows.map(r => `
      <div class="stat-row">
        <span class="stat-num">${r.num}</span>
        <span class="stat-desc">${r.desc}</span>
      </div>`).join('');

    const footerHTML = statsBack.footer
      ? `<div class="stats-regions">${statsBack.footer}</div>`
      : '';

    backHTML = `
      <div class="img-back">
        <div class="stats-label">${statsBack.label}</div>
        <div class="stats-body">${rowsHTML}</div>
        ${footerHTML}
        <div class="img-back-hint">Tap ↻</div>
      </div>`;

    ic.addEventListener('click', () => ic.classList.toggle('flipped'));
  }

  ic.innerHTML = `
    <div class="img-card-inner">
      <div class="img-front">
        <img src="https://picsum.photos/seed/${seed}/600/300" alt="Photo of the day"
             onerror="this.parentElement.style.background='#c8bfaa';this.style.display='none'"/>
        <div class="img-caption">Photo Of The Day${statsBack ? ' · Tap \u21BB' : ''}</div>
      </div>
      ${backHTML}
    </div>`;

  return ic;
}

async function loadStories() {
  const grid = document.getElementById('grid');

  try {
    const res = await fetch('./top10.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const stories = data.stories || [];

    const pubDate = data.published_at ? formatDate(data.published_at) : formatDisplayDate();
    document.getElementById('date-label').textContent = pubDate;
    document.getElementById('footer-stats').textContent = `Algorithmically Ranked · ${stories.length} Stories`;
    document.getElementById('edition-label').textContent = `Edition No. ${getEditionNumber()}`;

    buildTicker();
    buildEqualGridWithImage(stories);

  } catch (err) {
    console.error('Failed to load top10.json:', err);
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1">Next edition arrives at 6AM EST</div>`;
    buildTicker();
  }
}

document.getElementById('tagline').textContent = getDailyTagline();
document.getElementById('date-label').textContent = formatDisplayDate();
document.getElementById('cd').textContent = getCountdown();

setTimeOfDay();
loadStories();
setInterval(() => { document.getElementById('cd').textContent = getCountdown(); }, 60000);
</script>
