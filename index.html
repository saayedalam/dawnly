  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-1:  #1a1408;
      --ink-2:  #5a5040;
      --ink-3:  #9a8a70;
      --amber:  #c8820a;
      --paper:  #f5f0e4;
      --paper-2:#ede6d4;
      --border: rgba(42,36,16,0.15);

      /* Big story treatment — warm terracotta */
      --big-paper:   #f5e8d4;
      --big-paper-2: #eeddc4;
      --big-accent:  #b85c1a;
      --big-border:  rgba(184,92,26,0.35);
    }

    html, body { height: 100%; overflow: hidden; background: #e8e0cc; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--ink-1); }

    .np {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      overflow: hidden;
    }

    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      flex-shrink: 0;
    }

    .hero.light { background: linear-gradient(180deg,rgba(255,210,120,0.18) 0%,rgba(252,240,215,0.08) 65%,var(--paper) 100%); }
    .hero.dark  { background: linear-gradient(180deg,rgba(10,15,35,0.95) 0%,rgba(18,28,58,0.65) 52%,rgba(32,24,10,0.22) 74%,var(--paper) 100%); }

    .sky { position: absolute; inset: 0; pointer-events: none; opacity: 0.5; }

    .meta-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px 8px;
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 2;
    }

    /* ── Meta bar flip elements ─────────────────────────────────────────── */

    .meta-flip {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: inline-block;
      position: relative;
      height: 13px;
      cursor: default;
      /* perspective on the element itself for clean per-element 3D */
      perspective: 400px;
    }

    .meta-flip-link {
      text-decoration: none;
      cursor: pointer;
      /* Centre flip sits in absolute flow on desktop */
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Left and right elements must be equal width so the centre is truly centred */
    #edition-label {
      min-width: 160px;
    }

    .meta-flip-right {
      /* Right-align text inside */
      display: flex;
      justify-content: flex-end;
      min-width: 160px;
    }

    .flip-front,
    .flip-back {
      display: block;
      white-space: nowrap;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1),
                  opacity  0.4s cubic-bezier(0.4,0,0.2,1);
      backface-visibility: hidden;
    }

    /* Right-aligned element: anchor text to right instead */
    .meta-flip-right .flip-front,
    .meta-flip-right .flip-back {
      left: auto;
      right: 0;
    }

    /* Default state */
    .flip-front {
      color: var(--ink-2);
      transform: rotateX(0deg);
      opacity: 1;
    }

    .flip-back {
      color: var(--amber);
      transform: rotateX(-90deg);
      opacity: 0;
    }

    /* Flipped state — triggered by :hover on desktop, .active on mobile */
    .meta-flip:hover .flip-front,
    .meta-flip.active .flip-front {
      transform: rotateX(90deg);
      opacity: 0;
    }

    .meta-flip:hover .flip-back,
    .meta-flip.active .flip-back {
      transform: rotateX(0deg);
      opacity: 1;
    }

    /* Dark hero overrides */
    .hero.dark .flip-front {
      color: rgba(245, 238, 220, 0.82);
    }

    .logo-block {
      position: relative;
      z-index: 2;
      padding: 10px 24px 8px;
      border-bottom: 3px double rgba(42,36,16,0.4);
    }

    .hero.dark .logo-block {
      border-bottom-color: rgba(245, 238, 220, 0.22);
    }

    .logo-icon { width: 80px; height: 66px; margin: 0 auto 4px; display: block; }

    .ray { animation: ray-pulse 3s ease-in-out infinite; }
    .ray:nth-child(1) { animation-delay: 0.0s; }
    .ray:nth-child(2) { animation-delay: 0.3s; }
    .ray:nth-child(3) { animation-delay: 0.6s; }
    .ray:nth-child(4) { animation-delay: 0.9s; }
    .ray:nth-child(5) { animation-delay: 1.2s; }
    .ray:nth-child(6) { animation-delay: 1.5s; }
    .ray:nth-child(7) { animation-delay: 1.8s; }
    .ray:nth-child(8) { animation-delay: 0.15s; }

    @keyframes ray-pulse {
      0%,100% { opacity: 0.35; }
      50% { opacity: 1.0; }
    }

    #sun-body { animation: sun-glow 3s ease-in-out infinite; }

    @keyframes sun-glow {
      0%,100% { opacity: 0.55; }
      50% { opacity: 1.0; }
    }

    .logo-wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 72px;
      font-weight: 700;
      color: var(--ink-1);
      letter-spacing: 2px;
      line-height: 1;
      display: block;
    }

    .hero.dark .logo-wordmark {
      color: rgba(26, 20, 8, 0.9);
    }


    .ticker-wrap {
      overflow: hidden;
      padding: 4px 0;
      min-height: 22px;
      border-bottom: 2px solid var(--border);
      position: relative;
      z-index: 2;
      background: rgba(42,36,16,0.05);
      flex-shrink: 0;
    }

    .hero.dark .ticker-wrap {
      background: rgba(255,255,255,0.03);
      border-bottom-color: rgba(245, 238, 220, 0.16);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker 40s linear infinite;
      will-change: transform;
    }

    .ticker-item {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(42,36,16,0.78);
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
    }

    .ticker-item::after {
      content: "·";
      margin-left: 20px;
      color: rgba(42,36,16,0.35);
    }

    .hero.dark .ticker-item {
      color: rgba(26, 20, 8, 0.88);
    }

    .hero.dark .ticker-item::after {
      color: rgba(26, 20, 8, 0.45);
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 10px;
      min-height: 0;
    }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      flex-shrink: 0;
    }

    .sr-line { flex: 1; height: 1px; background: var(--ink-1); }

    .sr-text {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-1);
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      display: grid;
      gap: 1px;
      background: rgba(42,36,16,0.2);
      border: 1px solid rgba(42,36,16,0.2);
      min-height: 0;
    }

    .card {
      background: var(--paper);
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      padding: 12px 11px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--paper);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-back {
      transform: rotateY(180deg);
      background: var(--paper-2);
      justify-content: space-between;
    }

    .card-num {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .card:nth-child(1) .card-num,
    .card:nth-child(2) .card-num { color: var(--ink-1); }

    .card-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.35;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
    }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .card-regions,
    .card-hint,
    .back-hint,
    .back-source {
      font-family: 'Jost', sans-serif;
      text-transform: uppercase;
    }

    .card-regions {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-3);
    }

    .card-hint,
    .back-hint {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--ink-3);
    }

    .back-summary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      font-style: normal;
      color: var(--ink-1);
      line-height: 1.4;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      margin-bottom: 8px;
    }

    .back-sources {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .back-source {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-source:hover { color: var(--ink-1); }

    .back-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-3);
      flex-shrink: 0;
    }

    .back-hint {
      text-align: right;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* -----------------------------------------------------------------------
       Grouped card — one card representing multiple story angles
    ----------------------------------------------------------------------- */

    .card.grouped .card-front,
    .card.grouped .card-back {
      background: var(--big-paper);
    }

    .card.grouped .card-back {
      background: var(--big-paper-2);
    }

    .card.grouped .card-front::before {
      content: none;
    }

    .card.grouped .card-front,
    .card.grouped .card-back {
      box-shadow: inset 0 0 0 2px var(--big-accent);
    }

    .card.grouped .card-num {
      color: var(--big-accent);
    }

    /* Angle count badge on front */
    .angle-badge {
      font-family: 'Jost', sans-serif;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--big-accent);
      border: 1px solid var(--big-accent);
      padding: 1px 5px;
      display: inline-block;
      margin-bottom: 5px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* Angle list on card back */
    .angle-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .angle-item {
      border-left: 2px solid var(--big-border);
      padding-left: 8px;
      flex-shrink: 0;
    }

    .angle-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .angle-summary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 9px;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-2);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .img-card {
      background: #2a2410;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    /* Flip wrapper — same pattern as .card-inner */
    .img-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
    }

    .img-card.flipped .img-card-inner { transform: rotateY(180deg); }

    .img-front,
    .img-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .img-front {
      background: #2a2410;
    }

    .img-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.78;
    }

    .img-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* Stats back panel */
    .img-back {
      transform: rotateY(180deg);
      background: var(--paper-2);
      padding: 14px 13px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stats-label {
      font-family: 'Jost', sans-serif;
      font-size: 7.5px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .stats-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 9px;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1;
      flex-shrink: 0;
    }

    .stat-desc {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-2);
      line-height: 1.3;
    }

    .stats-regions {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--ink-2);
      line-height: 1.5;
      font-style: italic;
      flex-shrink: 0;
    }

    .img-back-hint {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-3);
      text-align: right;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-3);
      height: 100%;
    }

    .footer {
      border-top: 1px solid rgba(42,36,16,0.25);
      padding: 6px 0 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-subscribe-btn {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #e8920c;
      background: none;
      border: 1px solid rgba(232,146,12,0.5);
      padding: 4px 14px 3px;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .footer-subscribe-btn:hover {
      color: var(--paper);
      background: #e8920c;
      border-color: #e8920c;
    }

    .subscribe-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 44px;
    }

    .subscribe-overlay.open { display: flex; }

    .subscribe-box {
      position: relative;
      background: var(--paper);
      border: 1px solid rgba(42,36,16,0.2);
      border-bottom: 3px double rgba(42,36,16,0.4);
      padding: 20px 24px 18px;
      width: 340px;
      box-shadow: 0 -4px 24px rgba(42,36,16,0.08);
      animation: sub-rise 0.22s ease;
    }

    @keyframes sub-rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subscribe-label {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 10px;
    }

    .subscribe-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .subscribe-input {
      flex: 1;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--ink-1);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(42,36,16,0.25);
      padding: 4px 0;
      outline: none;
      letter-spacing: 0.5px;
    }

    .subscribe-input::placeholder { color: var(--ink-3); }
    .subscribe-input:focus { border-bottom-color: var(--amber); }

    .subscribe-submit {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--ink-1);
      border: none;
      padding: 5px 12px 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }

    .subscribe-submit:hover { background: var(--amber); }

    .subscribe-msg {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 10px;
      min-height: 14px;
      color: var(--ink-3);
    }

    .subscribe-msg.success { color: var(--amber); }
    .subscribe-msg.error   { color: #b85c1a; }

    .subscribe-close {
      position: absolute;
      top: 0; right: 0;
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--ink-3);
      cursor: pointer;
      background: none;
      border: none;
    }

    .subscribe-close:hover { color: var(--ink-1); }

    @media (max-width: 768px) {
      html, body {
        overflow: auto;
        height: auto;
      }

      .np {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .meta-bar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 10px 16px;

      .meta-flip {
        font-size: 7px;
        letter-spacing: 1px;
      }

      .meta-flip-link {
        position: static;
        transform: none;
        justify-self: center;
      }

      .meta-flip-right {
        justify-self: end;
        min-width: 0;
      }

      .content {
        padding: 0 12px 12px;
        min-height: auto;
      }

      .grid {
        gap: 8px;
        border: none;
        background: transparent;
        flex: unset;
        min-height: auto;
      }

      .card,
      .img-card {
        border: 1px solid rgba(42,36,16,0.2);
      }
    }

    /* On touch devices kill :hover — only .active controls flipping */
    @media (hover: none) {
      .meta-flip:hover .flip-front {
        transform: rotateX(0deg);
        opacity: 1;
      }
      .meta-flip:hover .flip-back {
        transform: rotateX(-90deg);

      }
    }
  </style>

<script>
const TICKER_MESSAGES = [
  "The Morning Paper, Rebuilt For Today",
  "Once A Day. Just Like It Used To Be.",
  "Your Daily Paper. Nothing In Between.",
  "The News, The Way It Used To Feel.",
  "One Edition. Every Morning.",
  "Read It. Put It Down. Live Your Day.",
  "The Paper Lands Once."
];

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function getTorontoNowParts() {
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Toronto',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hourCycle: 'h23'
  }).formatToParts(new Date());

  const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return {
    year: Number(map.year),
    month: Number(map.month),
    day: Number(map.day),
    hour: Number(map.hour),
    minute: Number(map.minute),
    second: Number(map.second)
  };
}

function getCountdown() {
  const p = getTorontoNowParts();
  const nowMinutes = p.hour * 60 + p.minute;
  const resetMinutes = 6 * 60;

  let diffMinutes;
  if (nowMinutes < resetMinutes) {
    diffMinutes = resetMinutes - nowMinutes;
  } else {
    diffMinutes = (24 * 60 - nowMinutes) + resetMinutes;
  }

  const hours = Math.floor(diffMinutes / 60);
  const minutes = diffMinutes % 60;
  return `Resets in ${hours}h ${minutes}m`;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    timeZone: 'America/Toronto',
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });
}

function formatDisplayDate() {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Toronto',
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric'
  }).format(new Date());
}

function getEditionNumber() {
  const launchDate = new Date('2026-03-12T00:00:00');
  const p = getTorontoNowParts();

  const currentEditionDate = new Date(p.year, p.month - 1, p.day);
  if (p.hour < 6) {
    currentEditionDate.setDate(currentEditionDate.getDate() - 1);
  }

  const diffDays = Math.floor((currentEditionDate - launchDate) / 86400000);
  return Math.max(1, diffDays + 1);
}

function toRoman(n) {
  const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let result = '';
  for (let i = 0; i < vals.length; i++) {
    while (n >= vals[i]) { result += syms[i]; n -= vals[i]; }
  }
  return result;
}

function setTimeOfDay() {
  const hero = document.getElementById('hero');
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const rays = document.querySelectorAll('.ray');
  const sunB = document.getElementById('sun-body');

  hero.classList.remove('light', 'dark');

  setTimeout(() => {
    canvas.width = canvas.offsetWidth || 900;
    canvas.height = canvas.offsetHeight || 200;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w = canvas.width, h = canvas.height;
    let rayColor = '#c8820a';
    let sunFill = '#e8a020';

    const torontoHour = getTorontoNowParts().hour;
    const isLight = torontoHour >= 6 && torontoHour < 18;

    if (isLight) {
      hero.classList.add('light');

      const g = ctx.createRadialGradient(w * 0.5, h * 0.3, 5, w * 0.5, h * 0.3, 100);
      g.addColorStop(0, 'rgba(255,195,70,0.14)');
      g.addColorStop(1, 'rgba(255,195,70,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    } else {
      hero.classList.add('dark');
      rayColor = 'rgba(190,210,255,0.5)';
      sunFill = 'rgba(180,200,255,0.25)';

      for (let i = 0; i < 55; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h * 0.8;
        const r = 0.35 + Math.random() * 1.1;
        const a = 0.2 + Math.random() * 0.55;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    rays.forEach(r => r.setAttribute('stroke', rayColor));
    if (sunB) sunB.setAttribute('fill', sunFill);
  }, 80);
}

function buildTicker() {
  const track = document.getElementById('ticker');
  const items = [...TICKER_MESSAGES, ...TICKER_MESSAGES, ...TICKER_MESSAGES];

  track.innerHTML = items.map(message =>
    `<span class="ticker-item">${message}</span>`
  ).join('');
}


function buildEqualGridWithImage(stories) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const TOTAL_SLOTS  = 12;  // 6 columns × 2 rows
  const STORY_SLOTS  = 10;  // max story cards

  // -----------------------------------------------------------------------
  // Compute stats for the two fixed image card backs
  // -----------------------------------------------------------------------
  const totalMentions   = stories.reduce((s, x) => s + (x.mentions || 0), 0);
  const allRegions      = [...new Set(stories.flatMap(x => x.regions || []))];
  const allSourceNames  = [...new Set(stories.flatMap(x => (x.sources || []).map(s => s.name)))];
  const top             = stories[0] || null;

  const statsCard1 = {
    label: "Edition At A Glance",
    rows: [
      { num: totalMentions,        desc: "articles\nin top stories" },
      { num: allRegions.length,    desc: "regions\ncovered" },
      { num: allSourceNames.length,desc: "sources\ncited" },
      { num: stories.length,       desc: "stories\nranked" },
    ],
    footer: null,
  };

  const statsCard2 = top ? {
    label: "Top Story",
    rows: [
      { num: top.mentions,  desc: "sources\ncovered it" },
      { num: top.diversity, desc: "regions\nreached" },
      { num: Math.round(top.score), desc: "relevance\nscore" },
    ],
    footer: top.regions ? top.regions.join(" · ") : null,
  } : null;

  // Fixed image positions: slot 5 = top-right (row 1 col 6), slot 6 = bottom-left (row 2 col 1)
  const imageSlots = [5, 6];

  // Track which of the two fixed image slots we're filling
  // so we assign stats to them in order
  let fixedImagesFilled = 0;
  const fixedStats = [statsCard1, statsCard2];

  // Unique seed counter for all image cards (no repeats)
  let imgSeedBase = 50;
  let storyIndex  = 0;
  const storyItems = stories.slice(0, STORY_SLOTS);

  const isMobile = window.innerWidth <= 768;

  if (isMobile) {
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gridTemplateRows    = 'none';
    grid.style.overflowY           = 'visible';

    for (let slot = 0; slot < TOTAL_SLOTS; slot++) {
      const isImageSlot = imageSlots.includes(slot);

      if (isImageSlot) {
        const stats = fixedStats[fixedImagesFilled++] || null;
        const img = buildImageCard(1, 1, 1, imgSeedBase++, stats);
        img.style.gridColumn = 'auto';
        img.style.gridRow    = 'auto';
        img.style.minHeight  = '180px';
        grid.appendChild(img);
      } else if (storyIndex < storyItems.length) {
        const card = buildCard(storyItems[storyIndex], storyIndex, 1, 1, 1, 1);
        card.style.gridColumn = 'auto';
        card.style.gridRow    = 'auto';
        card.style.minHeight  = '220px';
        grid.appendChild(card);
        storyIndex++;
      } else {
        const img = buildImageCard(1, 1, 1, imgSeedBase++, null);
        img.style.gridColumn = 'auto';
        img.style.gridRow    = 'auto';
        img.style.minHeight  = '180px';
        grid.appendChild(img);
      }
    }
    return;
  }

  // Desktop: 6-column × 2-row grid
  grid.style.overflowY           = 'hidden';
  grid.style.gridTemplateColumns = 'repeat(6, 1fr)';
  grid.style.gridTemplateRows    = 'repeat(2, 1fr)';

  for (let slot = 0; slot < TOTAL_SLOTS; slot++) {
    const col = (slot % 6) + 1;
    const row = slot < 6 ? 1 : 2;
    const isImageSlot = imageSlots.includes(slot);

    if (isImageSlot) {
      const stats = fixedStats[fixedImagesFilled++] || null;
      grid.appendChild(buildImageCard(1, col, row, imgSeedBase++, stats));
    } else if (storyIndex < storyItems.length) {
      grid.appendChild(buildCard(storyItems[storyIndex], storyIndex, 1, col, row, 1));
      storyIndex++;
    } else {
      grid.appendChild(buildImageCard(1, col, row, imgSeedBase++, null));
    }
  }
}

function buildCard(story, index, colSpan, colStart, rowStart, maxMentions) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.gridColumn = `${colStart} / span ${colSpan}`;
  card.style.gridRow = `${rowStart} / span 1`;

  const rank = ROMAN[index] || String(index + 1);
  const regions = story.regions
    ? (typeof story.regions === 'number' ? `${story.regions} Regions` : story.regions)
    : (story.diversity ? `${story.diversity} Regions` : '');

  const sources = (story.sources || []).slice(0, 3).map(s =>
    `<a class="back-source" href="${s.link}" target="_blank" rel="noopener"><span class="back-dot"></span>${s.name}</a>`
  ).join('');

  const isGrouped = story.is_grouped === true;

  if (isGrouped) {
    // -----------------------------------------------------------------------
    // Grouped card — front shows lead headline + angle badge,
    // back shows all angles with individual headlines and summaries
    // -----------------------------------------------------------------------
    card.classList.add('grouped');

    const angleCount = story.angle_count || (story.angles || []).length || 1;
    const anglesHTML = (story.angles || []).map(a => `
      <div class="angle-item">
        <div class="angle-headline">${a.headline}</div>
        ${a.summary ? `<div class="angle-summary">${a.summary}</div>` : ''}
      </div>`).join('');

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="card-num">${rank}</div>
          <div class="angle-badge">${angleCount} Angles · Tap To Explore</div>
          <div class="card-headline">${story.headline}</div>
          <div class="card-foot">
            <div class="card-regions">${regions}</div>
            <div class="card-hint">Tap ↻</div>
          </div>
        </div>
        <div class="card-back">
          <div class="angle-list">${anglesHTML}</div>
          <div class="back-sources">${sources}</div>
          <div class="back-hint">Tap ↻</div>
        </div>
      </div>`;

  } else {
    // -----------------------------------------------------------------------
    // Regular card
    // -----------------------------------------------------------------------
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="card-num">${rank}</div>
          <div class="card-headline">${story.headline}</div>
          <div class="card-foot">
            <div class="card-regions">${regions}</div>
            <div class="card-hint">Tap ↻</div>
          </div>
        </div>
        <div class="card-back">
          <div class="back-summary">${story.summary || story.headline}</div>
          <div class="back-sources">${sources}</div>
          <div class="back-hint">Tap ↻</div>
        </div>
      </div>`;
  }

  card.addEventListener('click', () => card.classList.toggle('flipped'));

  requestAnimationFrame(() => {
    const front = card.querySelector('.card-front');
    const headline = card.querySelector('.card-headline');
    const num = card.querySelector('.card-num');
    const foot = card.querySelector('.card-foot');

    if (front && headline) {
      const availH = front.clientHeight
        - (num ? num.offsetHeight + 4 : 0)
        - (foot ? foot.offsetHeight + 5 : 0)
        - 18;

      headline.style.overflow = 'hidden';
      headline.style.display = '-webkit-box';
      headline.style.webkitBoxOrient = 'vertical';

      let minSize = 14;
      let maxSize = 34;
      let bestSize = minSize;
      let bestLines = 2;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.1;
        const lines = Math.max(2, Math.floor(availH / lineH));

        headline.style.fontSize = mid + 'px';
        headline.style.lineHeight = '1.1';
        headline.style.webkitLineClamp = String(lines);

        const fits = headline.scrollHeight <= headline.clientHeight + 2;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      headline.style.fontSize = bestSize + 'px';
      headline.style.lineHeight = '1.1';
      headline.style.webkitLineClamp = String(bestLines);
    }

    const back = card.querySelector('.card-back');
    const summary = card.querySelector('.back-summary');
    const sourcesBlock = card.querySelector('.back-sources');
    const backHint = card.querySelector('.back-hint');

    // Back text fitting only applies to regular (non-grouped) cards
    if (back && summary && !isGrouped) {
      const availBackH = back.clientHeight
        - (sourcesBlock ? sourcesBlock.offsetHeight + 8 : 0)
        - (backHint ? backHint.offsetHeight + 5 : 0)
        - 32;

      summary.style.overflow = 'hidden';
      summary.style.display = '-webkit-box';
      summary.style.webkitBoxOrient = 'vertical';

      let minSize = 13;
      let maxSize = 24;
      let bestSize = minSize;
      let bestLines = 3;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.35;
        const lines = Math.max(3, Math.floor(availBackH / lineH));

        summary.style.fontSize = mid + 'px';
        summary.style.lineHeight = '1.35';
        summary.style.webkitLineClamp = String(lines);

        const fits = summary.scrollHeight <= summary.clientHeight + 1;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      summary.style.fontSize = bestSize + 'px';
      summary.style.lineHeight = '1.35';
      summary.style.webkitLineClamp = String(bestLines);
    }
  });

  return card;
}

/**
 * Build an image card.
 * @param {number}      colSpan
 * @param {number}      colStart
 * @param {number}      rowStart
 * @param {number}      seedOffset  - unique per card so photos never repeat
 * @param {object|null} statsBack   - if provided, card flips to show stats
 *   statsBack = { label, rows: [{num, desc}], footer }
 */
function buildImageCard(colSpan, colStart, rowStart, seedOffset = 0, statsBack = null) {
  const ic = document.createElement('div');
  ic.className = 'img-card';
  ic.style.gridColumn = `${colStart} / span ${Math.max(1, colSpan)}`;
  ic.style.gridRow    = `${rowStart} / span 1`;

  const daySeed = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const seed    = `dawnly-${daySeed}-${seedOffset}`;

  let backHTML = '';
  if (statsBack) {
    const rowsHTML = statsBack.rows.map(r => `
      <div class="stat-row">
        <span class="stat-num">${r.num}</span>
        <span class="stat-desc">${r.desc}</span>
      </div>`).join('');

    const footerHTML = statsBack.footer
      ? `<div class="stats-regions">${statsBack.footer}</div>`
      : '';

    backHTML = `
      <div class="img-back">
        <div class="stats-label">${statsBack.label}</div>
        <div class="stats-body">${rowsHTML}</div>
        ${footerHTML}
        <div class="img-back-hint">Tap ↻</div>
      </div>`;

    ic.addEventListener('click', () => ic.classList.toggle('flipped'));
  }

  ic.innerHTML = `
    <div class="img-card-inner">
      <div class="img-front">
        <img src="https://picsum.photos/seed/${seed}/600/300" alt="Photo of the day"
             onerror="this.parentElement.style.background='#c8bfaa';this.style.display='none'"/>
        <div class="img-caption">Photo Of The Day${statsBack ? ' · Tap \u21BB' : ''}</div>
      </div>
      ${backHTML}
    </div>`;

  return ic;
}

async function loadStories() {
  const grid = document.getElementById('grid');

  try {
    const res = await fetch('./top10.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const stories = data.stories || [];

    const pubDate = data.published_at ? formatDate(data.published_at) : formatDisplayDate();
    document.getElementById('date-front').textContent = pubDate;
    const editionNum = getEditionNumber();
    const volumeNum = toRoman(new Date().getFullYear() - 2025);
    document.getElementById('edition-front').textContent = `Edition No. ${editionNum}`;
    document.getElementById('edition-back').textContent  = `Volume ${volumeNum}`;

    buildTicker();
    buildEqualGridWithImage(stories);

  } catch (err) {
    console.error('Failed to load top10.json:', err);
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1">Next edition arrives at 6AM EST</div>`;
    buildTicker();
  }
}

const editionNum = getEditionNumber();
const volumeNum  = toRoman(new Date().getFullYear() - 2025);
document.getElementById('edition-front').textContent = `Edition No. ${editionNum}`;
document.getElementById('edition-back').textContent  = `Volume ${volumeNum}`;
document.getElementById('date-front').textContent    = formatDisplayDate();
document.getElementById('date-back').textContent     = getCountdown();

setTimeOfDay();
loadStories();
setInterval(() => {
  document.getElementById('date-back').textContent = getCountdown();
}, 60000);

// Mobile tap support for meta-bar flip elements
(function() {
  // Edition + Date: pure toggle on tap
  ['edition-label', 'date-label'].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      el.classList.toggle('active');
    }, { passive: false });
  });

  // Centre link: first tap reveals "About Dawnly", second tap navigates
  const link = document.getElementById('domain-label');
  if (!link) return;
  link.addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (link.classList.contains('active')) {
      window.location.href = link.getAttribute('href');
    } else {
      link.classList.add('active');
      setTimeout(() => link.classList.remove('active'), 2500);
    }
  }, { passive: false });
})();

function openSubscribe() {
  document.getElementById('subscribe-overlay').classList.add('open');
  setTimeout(() => document.getElementById('subscribe-email').focus(), 50);
  document.getElementById('subscribe-msg').textContent = '';
  document.getElementById('subscribe-msg').className = 'subscribe-msg';
  document.getElementById('subscribe-email').value = '';
}

function closeSubscribe() {
  document.getElementById('subscribe-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('subscribe-overlay')) closeSubscribe();
}

async function submitSubscribe() {
  const email = document.getElementById('subscribe-email').value.trim();
  const msg   = document.getElementById('subscribe-msg');

  if (!email || !email.includes('@')) {
    msg.textContent = 'Please enter a valid email.';
    msg.className = 'subscribe-msg error';
    return;
  }

  msg.textContent = 'Subscribing...';
  msg.className = 'subscribe-msg';

  try {
    const form = new FormData();
    form.append('email', email);

    const res = await fetch('https://buttondown.com/api/emails/embed-subscribe/dawnly', {
      method: 'POST',
      body: form,
    });

    if (res.ok || res.redirected) {
      msg.textContent = "You're in. See you at dawn.";
      msg.className = 'subscribe-msg success';
      document.getElementById('subscribe-email').value = '';
      setTimeout(closeSubscribe, 2800);
    } else {
      throw new Error(res.status);
    }
  } catch {
    msg.textContent = 'Something went wrong. Try again.';
    msg.className = 'subscribe-msg error';
  }
}
</script>
