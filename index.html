<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dawnly — The World, Gathered Daily</title>
  <meta name="description" content="The top 10 global news stories, algorithmically ranked. Updated once a day at dawn."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-1:  #1a1408;
      --ink-2:  #5a5040;
      --ink-3:  #9a8a70;
      --amber:  #c8820a;
      --paper:  #f5f0e4;
      --paper-2:#ede6d4;
      --border: rgba(42,36,16,0.15);
    }

    html, body { height: 100%; overflow: hidden; background: #e8e0cc; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--ink-1); }

    .np {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      overflow: hidden;
    }

    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      flex-shrink: 0;
    }

    .hero.light { background: linear-gradient(180deg,rgba(255,210,120,0.18) 0%,rgba(252,240,215,0.08) 65%,var(--paper) 100%); }
    .hero.dark  { background: linear-gradient(180deg,rgba(10,15,35,0.95) 0%,rgba(18,28,58,0.65) 58%,var(--paper) 100%); }

    .sky { position: absolute; inset: 0; pointer-events: none; opacity: 0.5; }

    .meta-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px 8px;
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 2;
    }

    .meta-label,
    .meta-domain {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-2);
    }

    .meta-domain {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero.dark .meta-label,
    .hero.dark .meta-domain {
      color: rgba(245, 238, 220, 0.82);
    }

    .logo-block {
      position: relative;
      z-index: 2;
      padding: 10px 24px 0;
      border-bottom: 3px double rgba(42,36,16,0.4);
    }

    .hero.dark .logo-block {
      border-bottom-color: rgba(245, 238, 220, 0.22);
    }

    .logo-icon { width: 80px; height: 66px; margin: 0 auto 4px; display: block; }

    .ray { animation: ray-pulse 3s ease-in-out infinite; }
    .ray:nth-child(1) { animation-delay: 0.0s; }
    .ray:nth-child(2) { animation-delay: 0.3s; }
    .ray:nth-child(3) { animation-delay: 0.6s; }
    .ray:nth-child(4) { animation-delay: 0.9s; }
    .ray:nth-child(5) { animation-delay: 1.2s; }
    .ray:nth-child(6) { animation-delay: 1.5s; }
    .ray:nth-child(7) { animation-delay: 1.8s; }
    .ray:nth-child(8) { animation-delay: 0.15s; }

    @keyframes ray-pulse {
      0%,100% { opacity: 0.35; }
      50% { opacity: 1.0; }
    }

    #sun-body { animation: sun-glow 3s ease-in-out infinite; }

    @keyframes sun-glow {
      0%,100% { opacity: 0.55; }
      50% { opacity: 1.0; }
    }

    .logo-wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--ink-1);
      letter-spacing: 2px;
      line-height: 1;
      display: block;
    }

    .hero.dark .logo-wordmark {
      color: rgba(26, 20, 8, 0.9);
    }

    .logo-tagline {
      font-family: 'Jost', sans-serif;
      font-size: 8.5px;
      font-weight: 400;
      color: var(--ink-2);
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
      padding: 7px 0 10px;
      min-height: 28px;
    }

    .hero.dark .logo-tagline {
      color: rgba(26, 20, 8, 0.72);
    }

    .ticker-wrap {
      overflow: hidden;
      padding: 4px 0;
      min-height: 22px;
      border-bottom: 2px solid var(--border);
      position: relative;
      z-index: 2;
      background: rgba(42,36,16,0.05);
      flex-shrink: 0;
    }

    .hero.dark .ticker-wrap {
      background: rgba(255,255,255,0.03);
      border-bottom-color: rgba(245, 238, 220, 0.16);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker 40s linear infinite;
      will-change: transform;
    }

    .ticker-item {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(42,36,16,0.78);
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
    }

    .ticker-item::after {
      content: "·";
      margin-left: 20px;
      color: rgba(42,36,16,0.35);
    }

    .hero.dark .ticker-item {
      color: rgba(26, 20, 8, 0.88);
    }

    .hero.dark .ticker-item::after {
      color: rgba(26, 20, 8, 0.45);
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 10px;
      min-height: 0;
    }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      flex-shrink: 0;
    }

    .sr-line { flex: 1; height: 1px; background: var(--ink-1); }

    .sr-text {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-1);
      white-space: nowrap;
    }

    .grid {
      flex: 1;
      display: grid;
      gap: 1px;
      background: rgba(42,36,16,0.2);
      border: 1px solid rgba(42,36,16,0.2);
      min-height: 0;
    }

    .card {
      background: var(--paper);
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      padding: 12px 11px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--paper);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-back {
      transform: rotateY(180deg);
      background: var(--paper-2);
      justify-content: space-between;
    }

    .card-num {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .card:nth-child(1) .card-num,
    .card:nth-child(2) .card-num { color: var(--ink-1); }

    .card-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      color: var(--ink-1);
      line-height: 1.35;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
    }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .card-regions,
    .card-hint,
    .back-hint,
    .back-source,
    .footer-left,
    .reset-front span,
    .reset-back span {
      font-family: 'Jost', sans-serif;
      text-transform: uppercase;
    }

    .card-regions {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-3);
    }

    .card-hint,
    .back-hint {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--ink-3);
    }

    .back-summary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      font-style: normal;
      color: var(--ink-1);
      line-height: 1.4;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      margin-bottom: 8px;
    }

    .back-sources {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .back-source {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-source:hover { color: var(--ink-1); }

    .back-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-3);
      flex-shrink: 0;
    }

    .back-hint {
      text-align: right;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .img-card {
      background: #2a2410;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.78;
    }

    .img-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-3);
      height: 100%;
    }

    .footer {
      border-top: 1px solid rgba(42,36,16,0.25);
      padding: 6px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: var(--ink-2);
    }

    .reset-badge { width: 80px; height: 24px; cursor: default; perspective: 500px; }

    .reset-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .reset-badge:hover .reset-inner { transform: rotateX(180deg); }

    .reset-front, .reset-back {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .reset-back { transform: rotateX(180deg); }

    .reset-front span {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--ink-2);
      border-bottom: 1px solid var(--ink-3);
      padding-bottom: 1px;
    }

    .reset-back span {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--ink-2);
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .meta-bar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 8px 12px 6px;
      }

      .meta-label,
      .meta-domain {
        font-size: 7px;
        letter-spacing: 1px;
      }

      .meta-label:first-child {
        justify-self: start;
      }

      .meta-domain {
        position: static;
        transform: none;
        justify-self: center;
      }

      #date-label {
        justify-self: end;
        text-align: right;
      }
    }

    @media (max-width: 768px) {
      .grid {
        gap: 8px;
        border: none;
        background: transparent;
      }

      .card,
      .img-card {
        border: 1px solid rgba(42,36,16,0.2);
      }

      .content {
        padding: 0 12px 12px;
      }
    }

    @media (max-width: 768px) {
      html, body {
        overflow: auto;
        height: auto;
      }

      .np {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .content {
        min-height: auto;
      }

      .grid {
        flex: unset;
        min-height: auto;
      }
    }
  </style>
</head>
<body>
<div class="np">

  <div class="hero" id="hero">
    <canvas class="sky" id="sky"></canvas>

    <div class="meta-bar">
      <span class="meta-label" id="edition-label">Edition No. 1</span>
      <span class="meta-domain">Dawnly.News</span>
      <span class="meta-label" id="date-label"></span>
    </div>

    <div class="logo-block">
      <svg class="logo-icon" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="55" y1="2" x2="55" y2="14" stroke="#c8820a" stroke-width="2" stroke-linecap="round" class="ray"/>
        <line x1="80" y1="7" x2="74" y2="17" stroke="#c8820a" stroke-width="2" stroke-linecap="round" class="ray"/>
        <line x1="98" y1="22" x2="89" y2="27" stroke="#c8820a" stroke-width="2" stroke-linecap="round" class="ray"/>
        <line x1="30" y1="7" x2="36" y2="17" stroke="#c8820a" stroke-width="2" stroke-linecap="round" class="ray"/>
        <line x1="12" y1="22" x2="21" y2="27" stroke="#c8820a" stroke-width="2" stroke-linecap="round" class="ray"/>
        <line x1="104" y1="44" x2="93" y2="44" stroke="#c8820a" stroke-width="1.8" stroke-linecap="round" class="ray"/>
        <line x1="6" y1="44" x2="17" y2="44" stroke="#c8820a" stroke-width="1.8" stroke-linecap="round" class="ray"/>
        <path d="M30 52 Q30 28 55 28 Q80 28 80 52" fill="#e8a020" opacity="0.9" id="sun-body"/>
        <path d="M30 52 Q30 28 55 28 Q80 28 80 52" fill="none" stroke="#c8820a" stroke-width="1.5" class="ray"/>
        <rect x="8" y="50" width="42" height="30" rx="1" fill="#f0ead8" stroke="#2a2410" stroke-width="1.5"/>
        <rect x="60" y="50" width="42" height="30" rx="1" fill="#f0ead8" stroke="#2a2410" stroke-width="1.5"/>
        <line x1="55" y1="50" x2="55" y2="80" stroke="#2a2410" stroke-width="1.5"/>
        <line x1="14" y1="57" x2="44" y2="57" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="14" y1="62" x2="44" y2="62" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="14" y1="67" x2="44" y2="67" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="14" y1="72" x2="36" y2="72" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="66" y1="57" x2="96" y2="57" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="66" y1="62" x2="96" y2="62" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="66" y1="67" x2="96" y2="67" stroke="#9a8a70" stroke-width="0.8"/>
        <line x1="66" y1="72" x2="88" y2="72" stroke="#9a8a70" stroke-width="0.8"/>
        <path d="M8 80 Q55 88 102 80" stroke="#2a2410" stroke-width="1.5" fill="none"/>
        <path d="M8 50 Q55 44 102 50" stroke="#2a2410" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="logo-wordmark">Dawnly</span>

    <div class="ticker-wrap">
      <div class="ticker-track" id="ticker"></div>

  <div class="content">
    <div class="section-rule">

      <div class="loading" style="grid-column:1/-1">Loading today's edition...</div>

        <div class="reset-inner">
          <div class="reset-front"><span>Resets 6AM</span></div>
          <div class="reset-back"><span id="cd"></span></div>

</div>

<script>
const TAGLINES = [
  "The Morning Paper, Rebuilt For Today",
  "Once A Day. Just Like It Used To Be.",
  "Your Daily Paper. Nothing In Between.",
  "The News, The Way It Used To Feel.",
  "One Edition. Every Morning.",
  "Read It. Put It Down. Live Your Day.",
  "The Paper Lands Once."
];

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function getDailyTagline() {
  const now = new Date();
  const day = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  return TAGLINES[day % TAGLINES.length];
}

function getCountdown() {
  const now = new Date();
  const reset = new Date();
  reset.setUTCHours(10, 0, 0, 0);
  if (now >= reset) reset.setUTCDate(reset.getUTCDate() + 1);
  const diff = reset - now;
  return `${Math.floor(diff / 3600000)}h ${Math.floor((diff % 3600000) / 60000)}m`;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
}

function formatDisplayDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric', year:'numeric'
  });
}

function getEditionNumber() {
  const launch = new Date('2026-03-12T10:00:00Z');
  const now = new Date();

  const currentEditionTime = new Date(now);
  currentEditionTime.setUTCHours(10, 0, 0, 0);

  if (now < currentEditionTime) {
    currentEditionTime.setUTCDate(currentEditionTime.getUTCDate() - 1);
  }

  const diffDays = Math.floor((currentEditionTime - launch) / 86400000);
  return Math.max(1, diffDays + 1);
}

function setTimeOfDay() {
  const hour = new Date().getHours();
  const hero = document.getElementById('hero');
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const rays = document.querySelectorAll('.ray');
  const sunB = document.getElementById('sun-body');

  hero.classList.remove('light', 'dark');

  setTimeout(() => {
    canvas.width = canvas.offsetWidth || 900;
    canvas.height = canvas.offsetHeight || 200;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w = canvas.width, h = canvas.height;
    let rayColor = '#c8820a';
    let sunFill = '#e8a020';

    const isLight = hour >= 6 && hour < 18;

    if (isLight) {
      hero.classList.add('light');

      const g = ctx.createRadialGradient(w * 0.5, h * 0.3, 5, w * 0.5, h * 0.3, 100);
      g.addColorStop(0, 'rgba(255,195,70,0.14)');
      g.addColorStop(1, 'rgba(255,195,70,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    } else {
      hero.classList.add('dark');
      rayColor = 'rgba(190,210,255,0.5)';
      sunFill = 'rgba(180,200,255,0.25)';

      for (let i = 0; i < 55; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h * 0.8;
        const r = 0.35 + Math.random() * 1.1;
        const a = 0.2 + Math.random() * 0.55;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    rays.forEach(r => r.setAttribute('stroke', rayColor));
    if (sunB) sunB.setAttribute('fill', sunFill);
  }, 80);
}

function buildTicker(stories) {
  const track = document.getElementById('ticker');

  const stopWords = new Set([
    'the','a','an','and','or','but','for','to','of','in','on','at','by','from',
    'with','over','under','after','before','into','about','against','between',
    'through','during','without','within','is','are','was','were','be','been',
    'being','it','its','their','his','her','they','them','this','that','these',
    'those','as','not','will','would','could','should','has','have','had'
  ]);

  const blacklist = new Set([
    'Tracking','Top','Today','Yesterday','Live','News','Edition','Stories',
    'One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
    'First','Second','Third','New','Old','Day','Days'
  ]);

  const counts = new Map();

  stories.forEach(story => {
    const words = (story.headline || '').match(/\b[A-Z][a-zA-Z'-]+\b/g) || [];

    words.forEach(word => {
      if (word.length < 3) return;
      if (stopWords.has(word.toLowerCase())) return;
      if (blacklist.has(word)) return;
      counts.set(word, (counts.get(word) || 0) + 1);
    });
  });

  let labels = [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([word]) => word);

  if (!labels.length) {
    labels = ["World", "Politics", "Economy", "Conflict", "Markets"];
  }

  const items = [...labels, ...labels, ...labels];
  track.innerHTML = items.map(word => `<span class="ticker-item">${word}</span>`).join('');
}

function buildEqualGridWithImage(stories) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const isMobile = window.innerWidth <= 768;
  const maxStorySlots = 8;
  const storyItems = stories.slice(0, maxStorySlots);

  if (isMobile) {
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gridTemplateRows = 'none';
    grid.style.overflowY = 'visible';

    storyItems.forEach((story, index) => {
      const card = buildCard(story, index, 1, 1, 1, 1);
      card.style.gridColumn = 'auto';
      card.style.gridRow = 'auto';
      card.style.minHeight = '220px';
      grid.appendChild(card);
    });

    for (let i = storyItems.length; i < maxStorySlots; i++) {
      const img = buildImageCard(1, 1, 1, i);
      img.style.gridColumn = 'auto';
      img.style.gridRow = 'auto';
      img.style.minHeight = '180px';
      grid.appendChild(img);
    }

    const img1 = buildImageCard(1, 1, 1, 100);
    const img2 = buildImageCard(1, 1, 1, 101);
    img1.style.gridColumn = 'auto';
    img1.style.gridRow = 'auto';
    img2.style.gridColumn = 'auto';
    img2.style.gridRow = 'auto';
    img1.style.minHeight = '180px';
    img2.style.minHeight = '180px';
    grid.appendChild(img1);
    grid.appendChild(img2);
    return;
  }

  grid.style.overflowY = 'hidden';
  grid.style.gridTemplateColumns = 'repeat(5, 1fr)';
  grid.style.gridTemplateRows = 'repeat(2, 1fr)';

  for (let index = 0; index < maxStorySlots; index++) {
    const row = index < 4 ? 1 : 2;
    const col = (index % 4) + 1;

    if (index < storyItems.length) {
      grid.appendChild(buildCard(storyItems[index], index, 1, col, row, 1));
    } else {
      grid.appendChild(buildImageCard(1, col, row, index));
    }
  }

  grid.appendChild(buildImageCard(1, 5, 1, 200));
  grid.appendChild(buildImageCard(1, 5, 2, 201));
}

function buildCard(story, index, colSpan, colStart, rowStart, maxMentions) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.gridColumn = `${colStart} / span ${colSpan}`;
  card.style.gridRow = `${rowStart} / span 1`;
  card._maxMentions = maxMentions || 1;

  const rank = ROMAN[index] || String(index + 1);
  const regions = story.regions
    ? (typeof story.regions === 'number' ? `${story.regions} Regions` : story.regions)
    : (story.diversity ? `${story.diversity} Regions` : '');

  const sources = (story.sources || []).slice(0, 3).map(s =>
    `<a class="back-source" href="${s.link}" target="_blank" rel="noopener"><span class="back-dot"></span>${s.name}</a>`
  ).join('');

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <div class="card-num">${rank}</div>
        <div class="card-headline">${story.headline}</div>
        <div class="card-foot">
          <div class="card-regions">${regions}</div>
          <div class="card-hint">Tap ↻</div>
        </div>
      </div>
      <div class="card-back">
        <div class="back-summary">${story.summary || story.headline}</div>
        <div class="back-sources">${sources}</div>
        <div class="back-hint">Tap ↻</div>
      </div>
    </div>`;

  card.addEventListener('click', () => card.classList.toggle('flipped'));

  requestAnimationFrame(() => {
    const front = card.querySelector('.card-front');
    const headline = card.querySelector('.card-headline');
    const num = card.querySelector('.card-num');
    const foot = card.querySelector('.card-foot');

    if (front && headline) {
      const availH = front.clientHeight
        - (num ? num.offsetHeight + 4 : 0)
        - (foot ? foot.offsetHeight + 5 : 0)
        - 18;

      headline.style.overflow = 'hidden';
      headline.style.display = '-webkit-box';
      headline.style.webkitBoxOrient = 'vertical';

      let minSize = 14;
      let maxSize = 34;
      let bestSize = minSize;
      let bestLines = 2;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.1;
        const lines = Math.max(2, Math.floor(availH / lineH));

        headline.style.fontSize = mid + 'px';
        headline.style.lineHeight = '1.1';
        headline.style.webkitLineClamp = String(lines);

        const fits = headline.scrollHeight <= headline.clientHeight + 2;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      headline.style.fontSize = bestSize + 'px';
      headline.style.lineHeight = '1.1';
      headline.style.webkitLineClamp = String(bestLines);
    }

    const back = card.querySelector('.card-back');
    const summary = card.querySelector('.back-summary');
    const sourcesBlock = card.querySelector('.back-sources');
    const backHint = card.querySelector('.back-hint');

    if (back && summary) {
      const availBackH = back.clientHeight
        - (sourcesBlock ? sourcesBlock.offsetHeight + 8 : 0)
        - (backHint ? backHint.offsetHeight + 5 : 0)
        - 18;

      summary.style.overflow = 'hidden';
      summary.style.display = '-webkit-box';
      summary.style.webkitBoxOrient = 'vertical';

      let minSize = 13;
      let maxSize = 24;
      let bestSize = minSize;
      let bestLines = 3;

      while (minSize <= maxSize) {
        const mid = Math.floor((minSize + maxSize) / 2);
        const lineH = mid * 1.35;
        const lines = Math.max(3, Math.floor(availBackH / lineH));

        summary.style.fontSize = mid + 'px';
        summary.style.lineHeight = '1.35';
        summary.style.webkitLineClamp = String(lines);

        const fits = summary.scrollHeight <= summary.clientHeight + 2;

        if (fits) {
          bestSize = mid;
          bestLines = lines;
          minSize = mid + 1;
        } else {
          maxSize = mid - 1;
        }
      }

      summary.style.fontSize = bestSize + 'px';
      summary.style.lineHeight = '1.35';
      summary.style.webkitLineClamp = String(bestLines);
    }
  });

  return card;
}

function buildImageCard(colSpan, colStart, rowStart, seedOffset = 0) {
  const ic = document.createElement('div');
  ic.className = 'img-card';
  ic.style.gridColumn = `${colStart} / span ${Math.max(1, colSpan)}`;
  ic.style.gridRow = `${rowStart} / span 1`;

  const daySeed = new Date().toISOString().slice(0, 10);
  const seed = `${daySeed}-${seedOffset}`;

  ic.innerHTML = `
    <img src="https://picsum.photos/seed/${seed}/600/300" alt="Photo of the day"
         onerror="this.parentElement.style.background='#c8bfaa';this.style.display='none'"/>
    <div class="img-caption">Photo Of The Day</div>`;
  return ic;
}

async function loadStories() {
  const grid = document.getElementById('grid');

  try {
    const res = await fetch('./top10.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const stories = data.stories || [];

    const pubDate = data.published_at ? formatDate(data.published_at) : formatDisplayDate();
    document.getElementById('date-label').textContent = pubDate;
    document.getElementById('footer-stats').textContent = `Algorithmically Ranked · ${stories.length} Stories`;
    document.getElementById('edition-label').textContent = `Edition No. ${getEditionNumber()}`;

    buildTicker(stories);
    buildEqualGridWithImage(stories);

  } catch (err) {
    console.error('Failed to load top10.json:', err);
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1">Next edition arrives at 6AM EST</div>`;
    buildTicker([]);
  }
}

document.getElementById('tagline').textContent = getDailyTagline();
document.getElementById('date-label').textContent = formatDisplayDate();
document.getElementById('cd').textContent = getCountdown();

setTimeOfDay();
loadStories();
setInterval(() => { document.getElementById('cd').textContent = getCountdown(); }, 60000);
</script>
