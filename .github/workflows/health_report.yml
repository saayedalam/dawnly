name: Dawnly Weekly Health Report

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 7AM EDT (UTC-5 EST = 12:00 UTC)
                           # In EST winter (UTC-5), this is 7AM — correct year-round
                           # Adjust to '0 11 * * 1' when EDT (UTC-4) is in effect Mar–Nov
  workflow_dispatch:       # Manual trigger from GitHub UI for testing

jobs:
  send-health-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send health report
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL:  ${{ secrets.OPERATOR_EMAIL }}
        run: python3 send_health_report.py
